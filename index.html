<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galaxy Love</title>
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
        "three/addons/controls/OrbitControls.js": "https://unpkg.com/three@0.152.2/examples/jsm/controls/OrbitControls.js",
        "three/examples/jsm/loaders/FontLoader.js": "https://unpkg.com/three@0.152.2/examples/jsm/loaders/FontLoader.js",
        "three/examples/jsm/geometries/TextGeometry.js": "https://unpkg.com/three@0.152.2/examples/jsm/geometries/TextGeometry.js"
      }
    }
  </script>
  <style>
  #player {
    position: fixed;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
  }

  #musicButton {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 12px 20px;
    background-color: #ffffff10;
    color: white;
    border: 1px solid white;
    border-radius: 8px;
    cursor: pointer;
    z-index: 9999;
    font-weight: bold;
    backdrop-filter: blur(5px);
  }

  #musicButton:hover {
    background-color: #ffffff30;
  }
</style>
</head>

<body>
  <div id="container"></div>

  <div id="landscape-warning">
    <div class="warning-content">
      <div class="rotate-icon"></div>
      <h1>Stellar Bloom</h1>
      <h1>Tinh Cầu</h1>
      <div class="stars-bg"></div>
    </div>
  </div>

  <div id="dark-overlay"></div>
  <div id="info"></div>
<h1 style="position: fixed; bottom: 10px; right: 10px; font-size: 18px; font-family: Arial, sans-serif; color: white; background: rgba(0, 0, 0, 0.4); padding: 6px 12px; border-radius: 8px; z-index: 9999;">
  Create by Gubas buat Ayang
</h1>
  <button id="musicButton" disabled>Mainkan Musik 🎵</button>
  <div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
  let player;

  const videoId = "Vq5cYJ4vtvk";
  const startTime = 227;
  const endTime = 261;

  window.onYouTubeIframeAPIReady = function () {
    player = new YT.Player("player", {
      height: "1",
      width: "1",
      videoId: videoId,
      playerVars: {
        autoplay: 0,
        controls: 0,
        start: startTime,
        end: endTime,
        loop: 1,
        playlist: videoId,
        enablejsapi: 1,
        playsinline: 1
      },
      events: {
        onReady: function () {
          const btn = document.getElementById("musicButton");
          btn.disabled = false;
          btn.innerText = "Mainkan Musik 🎵";

          player.setVolume(100);
          player.unMute();
        },
        onStateChange: function (event) {
          if (event.data === YT.PlayerState.ENDED) {
            player.seekTo(startTime);
            player.playVideo();
          }
        }
      }
    });
  };

  document.getElementById("musicButton").addEventListener("click", function () {
    if (player && player.playVideo) {
      player.unMute();
      player.setVolume(100);
      player.seekTo(startTime);
      player.playVideo();

      this.style.display = "none";
    }
  });
</script>

  <script type="module" src="script.js"></script>
</body>
</html>
